name: Build Peerify (Windows)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: ui/peerify/package-lock.json

      - name: Install Dependencies
        run: |
          cd ui/peerify
          npm install

      - name: Build and Package Electron App
        run: |
          cd ui/peerify
          npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Peerify-Windows-Setup
          path: |
            ui/peerify/dist/*.exe
            ui/peerify/dist/*.blockmap
          retention-days: 7
